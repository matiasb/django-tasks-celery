name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: taiki-e/install-action@just
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Type-checking resolves framework types from the standalone
          # django-tasks package (django-stubs doesn't cover the built-in
          # django.tasks yet), so install the extra here.
          pip install -e '.[django-tasks]' --group dev
          pip install "Django~=5.2"
      - name: Lint
        run: just lint

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        django-version: ["5.2", "6.0"]
        exclude:
          - django-version: "6.0"
            python-version: "3.10"
          - django-version: "6.0"
            python-version: "3.11"
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.python-version }}-pip-${{ hashFiles('pyproject.toml') }}
      - uses: taiki-e/install-action@just
      - name: Install dependencies
        shell: bash
        run: |
          pip install --upgrade pip
          pip install -e . --group dev
          pip install "Django~=${{ matrix.django-version }}"
          # Django < 6.0 needs the standalone django-tasks package; on 6.0 we
          # deliberately leave it out so the suite runs against the built-in
          # django.tasks framework.
          if [ "${{ matrix.django-version }}" = "5.2" ]; then
            pip install -e '.[django-tasks]'
          fi
      - name: Run tests
        if: ${{ !cancelled() }}
        run: just test -v2
